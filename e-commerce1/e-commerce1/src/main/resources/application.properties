# --- CONFIGURACIÓN MYSQL (XAMPP) ---
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce1?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Dialecto corregido para Hibernate 7+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Estrategia de tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# --- CARGA INICIAL ---
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# Ruta física donde se guardarán las fotos de los productos
app.upload.dir=./imagenes/

# Límites de tamaño para la subida de archivos (Fotos de alta calidad)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# --- DESACTIVACIÓN DE H2 
spring.h2.console.enabled=false